# Ansible Inventory - MySQL 目标主机 (命令行版)
# 用法: ansible-playbook -i inventory_example.ini mysql_config_update.yml

[mysql_servers]
# 标准部署 (mysql 在 PATH 中)
db-01 ansible_host=192.168.1.100
db-02 ansible_host=192.168.1.101

# 自定义 MySQL 安装路径示例
db-custom ansible_host=192.168.1.102 mysql_install_dir=/opt/mysql-8.0.35

[mysql_servers:vars]
# 连接配置
ansible_user=deploy
ansible_ssh_private_key_file=~/.ssh/id_rsa
mysql_connection_user=admin
mysql_connection_port=3306

# 参数值 (可通过命令行 -e 覆盖)
buffer_pool_size=4G
max_connections=800
tmp_table_size=128M
sort_buffer_size=4M

# 可选: 全局指定 MySQL 安装目录
# mysql_install_dir=/usr/local/mysql
